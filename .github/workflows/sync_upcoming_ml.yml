name: Sync Upcoming + ML Ranking

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  sync-upcoming-and-rank:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          find . -name requirements.txt -maxdepth 2 -exec pip install -r {} +

      - name: Install Node Dependencies
        run: |
          npm install -g tsx
          npm install @supabase/supabase-js dotenv csv-parse

      - name: Sync Upcoming Matches (Node)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GA_API_KEY: ${{ secrets.GA_API_KEY }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          echo "Syncing upcoming matches..."
          npx tsx src/scripts/cron_sync_upcoming.ts

      - name: Generate V1 ML Ranking (Python)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_ACTIONS: 'true'
        run: |
          echo "Generating V1 predictions ranking..."
          cd ml && python3 5_generate_rank.py

      - name: Generate V2 Striker Ranking (Python)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_ACTIONS: 'true'
        run: |
          echo "Generating V2 Striker ranking..."
          cd ml/specialized && python3 10_generate_striker_rank.py

      - name: Upload V1 Ranking to Supabase (Node)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Uploading V1 ranking results to Supabase..."
          npx tsx src/scripts/upload_ranking.ts

      - name: Upload V2 Striker Ranking to Supabase (Node)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Uploading V2 Striker ranking to Supabase..."
          npx tsx src/scripts/upload_v2_ranking.ts
