name: Cron Jobs

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: 'Job to run (matches | moki | s1_scores | upcoming)'
        required: true
        default: 'matches'

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r ml/requirements.txt

      - name: Install Dependencies
        run: npm ci

      - name: Run Script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GA_API_KEY: ${{ secrets.GA_API_KEY }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          if [ "${{ github.event.inputs.job_name }}" == "matches" ]; then
            echo "Running Sync Matches..."
            npx tsx src/scripts/cron_sync_matches.ts
          elif [ "${{ github.event.inputs.job_name }}" == "moki" ]; then
            echo "Running Sync Moki API..."
            npx tsx src/scripts/cron_sync_moki_api.ts
          elif [ "${{ github.event.inputs.job_name }}" == "s1_scores" ]; then
            echo "Running Sync Season 1 Scores API..."
            npx tsx src/scripts/cron_sync_s1_scores.ts
          elif [ "${{ github.event.inputs.job_name }}" == "upcoming" ]; then
            echo "Running Sync Upcoming Matches..."
            npx tsx src/scripts/cron_sync_upcoming.ts
          else
            echo "Unknown job name: ${{ github.event.inputs.job_name }}"
            exit 1
          fi
