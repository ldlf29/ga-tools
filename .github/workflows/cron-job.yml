name: Update Database Cron

on:
  schedule:
    # Runs at 03:27, 09:27, 15:27, 21:27 UTC (every 6 hours)
    # This provides a 15-minute buffer after the Google Sheets script runs
    - cron: '27 3,9,15,21 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call Update DB API
        run: |
          curl -X GET ${{ secrets.VERCEL_URL }}/api/cron/update-db \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail
