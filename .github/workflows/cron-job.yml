name: Update Database Cron

on:
  schedule:
    # Runs at 03:27 and 15:27 UTC (12:27 AM/PM Argentina time)
    # This provides a 15-minute buffer after the Google Sheets script runs at 12:12
    - cron: '27 3,15 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call Update DB API
        run: |
          curl -X GET ${{ secrets.VERCEL_URL }}/api/cron/update-db \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail
