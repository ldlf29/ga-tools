name: Sync Data (Node)

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: 'Job to run (matches | moki | s1_scores)'
        required: true
        default: 'matches'
        type: choice
        options:
          - matches
          - moki
          - s1_scores

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Sync Script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GA_API_KEY: ${{ secrets.GA_API_KEY }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          # Necesario para que el script de moki dispare el workflow de ML al detectar class changes
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
          GH_REPO_OWNER: ${{ github.repository_owner }}
          GH_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ "${{ github.event.inputs.job_name }}" == "matches" ]; then
            echo "Running Sync Matches..."
            npx tsx src/scripts/cron_sync_matches.ts

          elif [ "${{ github.event.inputs.job_name }}" == "moki" ]; then
            echo "Running Sync Moki API..."
            npx tsx src/scripts/cron_sync_moki_api.ts

          elif [ "${{ github.event.inputs.job_name }}" == "s1_scores" ]; then
            echo "Running Sync Season 1 Scores..."
            npx tsx src/scripts/cron_sync_s1_scores.ts

          else
            echo "Unknown job_name: ${{ github.event.inputs.job_name }}"
            exit 1
          fi
